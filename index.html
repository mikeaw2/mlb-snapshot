<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Snapshot</title>
<style>
  body {
    background-color: #121212;
    color: #eee;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  header {
    padding: 1rem;
    text-align: center;
    background-color: #1f1f1f;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 1rem;
  }
  .team-card {
    background-color: #1f1f1f;
    border-radius: 8px;
    margin: 0.5rem;
    padding: 1rem;
    width: 220px;
    box-shadow: 0 0 5px rgba(255,255,255,0.1);
  }
  .team-card h2 {
    margin: 0 0 0.5rem 0;
    font-size: 1.2rem;
    text-align: center;
  }
  .player {
    display: flex;
    justify-content: space-between;
    margin: 0.2rem 0;
  }
  .delta {
    font-weight: bold;
  }
  .delta.up { color: #4CAF50; }
  .delta.down { color: #F44336; }
  footer {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.9rem;
    background-color: #1f1f1f;
  }
</style>
</head>
<body>
<header>MLB Snapshot</header>
<div class="container" id="teams-container"></div>
<footer id="last-updated"></footer>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdTOd2bszOwB3mFbJfLHxeaFsGTWucle4tqkDTiMGdysKQJLOz8_By-pel1D6zSm6ZH1J8XsBUQYYb/pub?output=csv'; 
const allTeams = [
  'Yankees','Red Sox','Rays','Blue Jays','Orioles','White Sox','Guardians','Tigers','Twins','Royals',
  'Dodgers','Giants','Padres','Diamondbacks','Rockies','Cardinals','Cubs','Brewers','Pirates','Reds',
  'Mets','Phillies','Braves','Marlins','Nationals','Marlins','Marlins','Angels','Mariners','Rangers'
]; 

function fetchCSV() {
  fetch(csvUrl)
    .then(res => res.text())
    .then(text => {
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows[0];
      const data = rows.slice(1).map(r => {
        let obj = {};
        headers.forEach((h,i) => obj[h] = r[i]);
        return obj;
      });
      renderTeams(data);
      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleString()}`;
    })
    .catch(err => console.error('Failed to fetch sheet:', err));
}

function renderTeams(data) {
  const container = document.getElementById('teams-container');
  container.innerHTML = '';
  allTeams.forEach(team => {
    const teamPlayers = data.filter(d => d.Team === team).slice(0,5);
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `<h2>${team}</h2>`;
    teamPlayers.forEach(p => {
      ['AVG','HR','RBI','SB','SLG'].forEach(stat => {
        const deltaVal = parseFloat(p[stat]) - parseFloat(p[stat+'_prev']);
        const deltaClass = deltaVal > 0 ? 'up' : deltaVal < 0 ? 'down' : '';
        const deltaText = deltaVal ? ` (${deltaVal.toFixed(3)})` : '';
        card.innerHTML += `<div class="player">${p.Player} - ${stat}: ${p[stat]}<span class="delta ${deltaClass}">${deltaText}</span></div>`;
      });
    });
    container.appendChild(card);
  });
}

// Initial fetch
fetchCSV();

// Refresh every 60 seconds
setInterval(fetchCSV, 60000);
</script>
</body>
</html>
