<!DOCTYPE html>
<html>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>
<head>
<title>MLB Snapshot</title>

<style>
body {
background:#0b0e11;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

<script>
var publicSpreadsheetUrl = https://docs.google.com/spreadsheets/d/e/2PACX-1vSdTOd2bszOwB3mFbJfLHxeaFsGTWucle4tqkDTiMGdysKQJLOz8_By-pel1D6zSm6ZH1J8XsBUQYYb/pubhtml ;

function showData(data) {
    const grid = document.querySelector('.grid');
    grid.innerHTML = ''; // clear previous content

    // Group players by team
    let teams = {};
    data.forEach(player => {
        if (!teams[player.Team]) teams[player.Team] = [];
        teams[player.Team].push(player);
    });

    // Build a card per team
    Object.keys(teams).forEach(teamName => {
        let teamPlayers = teams[teamName];

        const stats = ['AVG','HR','RBI','SB','SLG'];
        let cardHtml = `<div class="card"><div class="team">${teamName}</div>`;

        stats.forEach(stat => {
            cardHtml += `<div class="stat-title">${stat}</div>`;
            let top5 = teamPlayers
                .sort((a,b) => parseFloat(b[stat]) - parseFloat(a[stat]))
                .slice(0,5);

            top5.forEach(p => {
                // For now, delta is 0
                cardHtml += `<div class="player">${p.Player} <span>${p[stat]} <span class="neutral">(0)</span></span></div>`;
            });
        });

        cardHtml += `</div>`;
        grid.innerHTML += cardHtml;
    });
}

// Initialize Tabletop
window.addEventListener('DOMContentLoaded', function() {
    Tabletop.init({
        key: publicSpreadsheetUrl,
        callback: showData,
        simpleSheet: true
    });
});
</script>

.card{
background:#11151a;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.5);
}

.team{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.stat-title{
color:#888;
margin-top:10px;
}

.player{
display:flex;
justify-content:space-between;
font-size:14px;
}

.up{color:#00ff9c;}
.down{color:#ff4d4d;}
.neutral{color:#999;}
</style>
</head>

<body>

<h1>MLB Snapshot</h1>

<div class="grid">

<div class="card">
<div class="team">Yankees</div>

<div class="stat-title">AVG</div>
<div class="player">Judge <span>.333 <span class="up">(+.012)</span></span></div>
<div class="player">Soto <span>.310 <span class="down">(-.004)</span></span></div>

<div class="stat-title">HR</div>
<div class="player">Judge <span>6 <span class="up">(+1)</span></span></div>
<div class="player">Stanton <span>4 <span class="neutral">(0)</span></span></div>

</div>

</div>

</body>
</html>
