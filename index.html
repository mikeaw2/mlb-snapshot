<!DOCTYPE html>
<html>
<head>
    <title>MLB Snapshot Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>
</head>
<body>
<h1>MLB Snapshot Test</h1>
<p>Check the console to see if data loads.</p>

<script>
var publicSpreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdTOd2bszOwB3mFbJfLHxeaFsGTWucle4tqkDTiMGdysKQJLOz8_By-pel1D6zSm6ZH1J8XsBUQYYb/pubhtml' ;

function testData(data){
    console.log('Sheet data:', data);
    alert('Data fetched! Check console.');
}

window.addEventListener('DOMContentLoaded', function(){
    Tabletop.init({
        key: publicSpreadsheetUrl,
        callback: testData,
        simpleSheet: true
    });
});
</script>
</body>
</html>
